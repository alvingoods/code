name: Generate Index Manifest

on:
  push:
    branches:
      - main

permissions:
  contents: write   # memberi izin workflow untuk push commit

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate index.html manifest
        run: node generate-index.js

      - name: Commit and push index.html
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Auto-generate manifest index.html" || echo "No changes to commit"
          git push
