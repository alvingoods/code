<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern QR Code Generator</title>
    <!-- Import Library Luar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        p.subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        .btn-generate {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-generate:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-download {
            background-color: #ecfdf5;
            color: #059669;
            display: none; /* Muncul setelah QR dibuat */
        }

        .btn-download:hover {
            background-color: #d1fae5;
        }

        #qrcode-container {
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            border: 2px dashed #f1f5f9;
            border-radius: 16px;
            padding: 20px;
            background: #fff;
        }

        #qrcode img {
            border-radius: 8px;
        }

        .empty-state {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        footer {
            margin-top: 24px;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>QR Generator</h1>
    <p class="subtitle">Ubah teks atau tautan menjadi kode QR</p>

    <div class="input-group">
        <input type="text" id="text-input" placeholder="Masukkan link atau teks..." autocomplete="off">
    </div>

    <button class="btn-generate" onclick="generateQR()">Buat QR Code</button>
    
    <div id="qrcode-container">
        <div id="qrcode">
            <span class="empty-state">QR Code akan muncul di sini</span>
        </div>
    </div>

    <button id="download-btn" class="btn-download" onclick="downloadQR()">Simpan Gambar (PNG)</button>

    <footer>Powered by QRCode.js</footer>
</div>

<script>
    let qr = null;

    function generateQR() {
        const input = document.getElementById('text-input').value.trim();
        const qrDiv = document.getElementById('qrcode');
        const downloadBtn = document.getElementById('download-btn');

        if (!input) {
            alert("Harap isi teks terlebih dahulu!");
            return;
        }

        // Hapus isi lama
        qrDiv.innerHTML = "";

        // Buat QR Code
        // Secara default library ini menggunakan auto-versioning (mengatasi error "text too long")
        qr = new QRCode(qrDiv, {
            text: input,
            width: 200,
            height: 200,
            colorDark: "#1e293b",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });

        // Tampilkan tombol unduh
        downloadBtn.style.display = "block";
    }

    function downloadQR() {
        // Cari elemen canvas yang dibuat oleh library
        const canvas = document.querySelector('#qrcode canvas');
        if (canvas) {
            const dataUrl = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = 'my-qrcode.png';
            link.href = dataUrl;
            link.click();
        }
    }

    // Support tekan Enter
    document.getElementById('text-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            generateQR();
        }
    });
</script>

</body>
</html>
